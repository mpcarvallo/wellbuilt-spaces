<svg viewBox="0 0 640 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rolling green hills under a soft sky">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2e6"/>
      <stop offset="55%" stop-color="#dfe7d2"/>
      <stop offset="100%" stop-color="#cdd9be"/>
    </linearGradient>
    <linearGradient id="h1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b7c6a8"/>
      <stop offset="100%" stop-color="#9fb391"/>
    </linearGradient>
    <linearGradient id="h2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ba079"/>
      <stop offset="100%" stop-color="#728c60"/>
    </linearGradient>
    <linearGradient id="h3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5f7a4f"/>
      <stop offset="100%" stop-color="#4c6640"/>
    </linearGradient>
    <linearGradient id="h4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#435a40"/>
      <stop offset="100%" stop-color="#374b34"/>
    </linearGradient>
  </defs>

  <rect width="640" height="800" fill="url(#sky)"/>

  <!-- soft sun -->
  <circle cx="470" cy="150" r="66" fill="#f7f4ee" opacity="0.75"/>
  <circle cx="470" cy="150" r="98" fill="#f7f4ee" opacity="0.28"/>

  <!-- distant ridge -->
  <path d="M0 300 C 120 250, 240 280, 360 260 S 560 230, 640 268 L640 800 L0 800 Z" fill="url(#h1)"/>
  <!-- mid ridge -->
  <path d="M0 400 C 140 340, 280 400, 420 360 S 600 340, 640 380 L640 800 L0 800 Z" fill="url(#h2)"/>
  <!-- near hill -->
  <path d="M0 520 C 160 440, 300 520, 460 480 S 600 470, 640 500 L640 800 L0 800 Z" fill="url(#h3)"/>
  <!-- foreground -->
  <path d="M0 660 C 180 590, 340 660, 500 628 S 620 620, 640 636 L640 800 L0 800 Z" fill="url(#h4)"/>

  <!-- winding path on the near hill -->
  <path d="M300 800 C 320 720, 380 700, 400 640 C 414 600, 470 590, 500 560"
        fill="none" stroke="#e9e2d4" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
  <path d="M300 800 C 320 720, 380 700, 400 640 C 414 600, 470 590, 500 560"
        fill="none" stroke="#f4efe2" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- scattered trees -->
  <g fill="#33452f" opacity="0.9">
    <circle cx="120" cy="612" r="7"/>
    <circle cx="150" cy="628" r="6"/>
    <circle cx="560" cy="672" r="7"/>
    <circle cx="588" cy="686" r="6"/>
    <circle cx="240" cy="700" r="6"/>
  </g>
</svg>
